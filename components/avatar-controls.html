<!-- Avatar Controls Component -->
<div class="avatar-controls-section">
    <div class="controls-header">
        <h3>Personalizza Avatar</h3>
        <div class="save-actions">
            <button id="saveAvatarBtn" class="btn-primary">
                💾 Salva Avatar
            </button>
        </div>
    </div>
    
    <div class="controls-grid">
        <!-- Color Controls -->
        <div class="control-group">
            <h4>Colori</h4>
            <div class="color-controls">
                <div class="color-group">
                    <label>Colore Pelle:</label>
                    <div class="color-buttons">
                        <button class="color-btn" data-color="#fdbcb4" data-type="skin" style="background: #fdbcb4;">🍑</button>
                        <button class="color-btn" data-color="#f8a5a2" data-type="skin" style="background: #f8a5a2;">🍑</button>
                        <button class="color-btn" data-color="#d4a574" data-type="skin" style="background: #d4a574;">🟤</button>
                        <button class="color-btn" data-color="#8d5524" data-type="skin" style="background: #8d5524;">🟫</button>
                        <button class="color-btn" data-color="#ffe0bd" data-type="skin" style="background: #ffe0bd;">🟨</button>
                    </div>
                </div>
                
                <div class="color-group">
                    <label>Colore Occhi:</label>
                    <div class="color-buttons">
                        <button class="color-btn" data-color="#333333" data-type="eyes" style="background: #333333;">⚫</button>
                        <button class="color-btn" data-color="#4169e1" data-type="eyes" style="background: #4169e1;">🔵</button>
                        <button class="color-btn" data-color="#228b22" data-type="eyes" style="background: #228b22;">🟢</button>
                        <button class="color-btn" data-color="#8b4513" data-type="eyes" style="background: #8b4513;">🟤</button>
                        <button class="color-btn" data-color="#808080" data-type="eyes" style="background: #808080;">⚪</button>
                    </div>
                </div>
                
                <div class="color-group">
                    <label>Colore Capelli:</label>
                    <div class="color-buttons">
                        <button class="color-btn" data-color="#8b4513" data-type="hair" style="background: #8b4513;">🟤</button>
                        <button class="color-btn" data-color="#000000" data-type="hair" style="background: #000000;">⚫</button>
                        <button class="color-btn" data-color="#ffd700" data-type="hair" style="background: #ffd700;">🟡</button>
                        <button class="color-btn" data-color="#ff6b6b" data-type="hair" style="background: #ff6b6b;">🔴</button>
                        <button class="color-btn" data-color="#4169e1" data-type="hair" style="background: #4169e1;">🔵</button>
                    </div>
                </div>
                
                <div class="color-group">
                    <label>Colore Maglietta:</label>
                    <div class="color-buttons">
                        <button class="color-btn" data-color="#4a90e2" data-type="shirt" style="background: #4a90e2;">🔵</button>
                        <button class="color-btn" data-color="#27ae60" data-type="shirt" style="background: #27ae60;">🟢</button>
                        <button class="color-btn" data-color="#e74c3c" data-type="shirt" style="background: #e74c3c;">🔴</button>
                        <button class="color-btn" data-color="#9b59b6" data-type="shirt" style="background: #9b59b6;">🟣</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Style Controls -->
        <div class="control-group">
            <h4>Stile Capelli</h4>
            <div class="style-controls">
                <div class="style-group">
                    <div class="style-buttons">
                        <button class="hair-style-btn" data-style="short" data-type="hair-style">👦 Corto</button>
                        <button class="hair-style-btn" data-style="long" data-type="hair-style">👧 Lungo</button>
                        <button class="hair-style-btn" data-style="spiky" data-type="hair-style">🦹 Punteggiato</button>
                        <button class="hair-style-btn" data-style="curly" data-type="hair-style">👨 Riccio</button>
                        <button class="hair-style-btn" data-style="bald" data-type="hair-style">👨‍🦲 Calvo</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Accessories Controls -->
        <div class="control-group">
            <h4>Accessori</h4>
            <div class="accessories-controls">
                <div class="accessories-grid">
                    <button class="accessory-btn" data-accessory="glasses" data-type="accessory">
                        🕶️ Occhiali
                    </button>
                    <button class="accessory-btn" data-accessory="hat" data-type="accessory">
                        🎩 Cappello
                    </button>
                    <button class="accessory-btn" data-accessory="crown" data-type="accessory">
                        👑 Corona
                    </button>
                    <button class="accessory-btn" data-accessory="headband" data-type="accessory">
                        🎯 Fascia
                    </button>
                    <button class="accessory-btn" data-accessory="earrings" data-type="accessory">
                        🎵 Orecchini
                    </button>
                    <button class="accessory-btn" data-accessory="necklace" data-type="accessory">
                        📿 Collana
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
