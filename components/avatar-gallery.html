<!-- Avatar Gallery Component -->
<div class="avatar-gallery-section">
    <div class="gallery-header">
        <h3>Avatar Preimpostati</h3>
        <div class="gallery-filter">
            <select id="galleryFilter" class="filter-select">
                <option value="all">Tutti</option>
                <option value="male">Maschile</option>
                <option value="female">Femminile</option>
                <option value="custom">Personalizzati</option>
            </select>
        </div>
    </div>
    
    <div class="gallery-grid" id="galleryGrid">
        <!-- Predefined avatars will be loaded here -->
    </div>
    
    <div class="gallery-actions">
        <button id="createNewBtn" class="btn-secondary">
            ➕ Crea Nuovo
        </button>
        <button id="importBtn" class="btn-secondary">
            📥 Importa
        </button>
    </div>
</div>
