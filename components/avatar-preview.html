<!-- Avatar Preview Component -->
<div class="avatar-preview-section">
    <div class="preview-header">
        <h3>Anteprima Avatar</h3>
        <div class="preview-actions">
            <button id="randomizeBtn" class="btn-secondary">
                🎲 Randomizza
            </button>
            <button id="resetBtn" class="btn-secondary">
                🔄 Reset
            </button>
        </div>
    </div>
    
    <div class="avatar-display">
        <div class="avatar-canvas-container">
            <svg id="avatarCanvas" width="200" height="200" viewBox="0 0 100 100" class="avatar-svg">
                <!-- Background -->
                <rect width="100" height="100" fill="#f0f0f0" rx="10"/>
                
                <!-- Head -->
                <circle id="avatarHead" cx="50" cy="40" r="25" fill="#fdbcb4" stroke="#333" stroke-width="1"/>
                
                <!-- Eyes -->
                <circle id="leftEye" cx="42" cy="38" r="3" fill="#333"/>
                <circle id="rightEye" cx="58" cy="38" r="3" fill="#333"/>
                
                <!-- Mouth -->
                <path id="avatarMouth" d="M 45 48 Q 50 52, 55 48" stroke="#333" stroke-width="1.5" fill="none"/>
                
                <!-- Hair Container -->
                <g id="hairContainer"></g>
                
                <!-- Shirt -->
                <rect id="avatarShirt" x="25" y="65" width="50" height="30" fill="#4a90e2" rx="5"/>
                
                <!-- Accessories Container -->
                <g id="accessoriesContainer"></g>
            </svg>
        </div>
        
        <div class="avatar-info">
            <div class="info-item">
                <span class="info-label">Livello:</span>
                <span id="avatarLevel" class="info-value">1</span>
            </div>
            <div class="info-item">
                <span class="info-label">Crediti:</span>
                <span id="avatarCredits" class="info-value">0</span>
            </div>
            <div class="info-item">
                <span class="info-label">Accessori:</span>
                <span id="avatarAccessories" class="info-value">0</span>
            </div>
        </div>
    </div>
</div>
