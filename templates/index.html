<!-- Homepage Minimal - BrainPlayNG -->

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrainPlayNG</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }
        
        /* Hero Minimal */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: 
                radial-gradient(circle at 50% 50%, rgba(120, 119, 198, 0.1) 0%, transparent 70%),
                radial-gradient(circle at 20% 80%, rgba(255, 119, 198, 0.08) 0%, transparent 60%),
                radial-gradient(circle at 80% 20%, rgba(120, 219, 255, 0.06) 0%, transparent 50%),
                linear-gradient(180deg, #000 0%, #0a0a0a 100%);
        }
        
        .hero-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(120, 219, 255, 0.4);
            border-radius: 50%;
            animation: float 30s infinite linear;
        }
        
        @keyframes float {
            0% {
                transform: translateY(100vh) translateX(0) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(50px) scale(1);
                opacity: 0;
            }
        }
        
        .hero-content {
            position: relative;
            z-index: 10;
            text-align: center;
        }
        
        .hero-title {
            font-size: 5rem;
            font-weight: 900;
            background: linear-gradient(45deg, #7877c6, #ff77c6, #78dbff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 2rem;
            animation: glow 3s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            0% {
                filter: drop-shadow(0 0 20px rgba(120, 119, 198, 0.5));
            }
            100% {
                filter: drop-shadow(0 0 40px rgba(255, 119, 198, 0.8));
            }
        }
        
        .hero-actions {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            padding: 1.2rem 2.5rem;
            border: none;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .action-btn.primary {
            background: linear-gradient(135deg, #7877c6, #ff77c6);
            color: white;
            box-shadow: 0 10px 30px rgba(120, 119, 198, 0.3);
        }
        
        .action-btn.primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(120, 119, 198, 0.5);
        }
        
        .action-btn.secondary {
            background: rgba(255, 255, 255, 0.08);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }
        
        .action-btn.secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-3px);
        }
        
        /* Profile Icon */
        .profile-icon-wrapper {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 1000;
            cursor: pointer;
        }
        
        .profile-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            position: relative;
            border: 3px solid rgba(255, 255, 255, 0.2);
            background: linear-gradient(135deg, #7877c6, #ff77c6);
            padding: 3px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(120, 119, 198, 0.4);
        }
        
        .profile-icon:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(120, 119, 198, 0.7);
            border-color: rgba(255, 255, 255, 0.4);
        }
        
        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .profile-status {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 12px;
            height: 12px;
            background: #10b981;
            border: 2px solid white;
            border-radius: 50%;
        }
        
        /* Profile Popup */
        .profile-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: linear-gradient(45deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            padding: 0;
            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            min-width: 350px;
            max-width: 400px;
        }
        
        .profile-popup.active {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }
        
        .popup-content {
            padding: 2rem;
        }
        
        .popup-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            position: relative;
        }
        
        .popup-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        
        .popup-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .popup-info h3 {
            margin: 0;
            color: #fff;
            font-size: 1.2rem;
            font-weight: 600;
        }
        
        .popup-info p {
            margin: 0.25rem 0 0 0;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }
        
        .close-popup {
            position: absolute;
            top: -10px;
            right: -10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .close-popup:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }
        
        .popup-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .stat-item {
            text-align: center;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: #78dbff;
            margin-bottom: 0.25rem;
        }
        
        .stat-label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
        }
        
        .popup-actions {
            display: flex;
            gap: 1rem;
        }
        
        .popup-actions .action-btn {
            flex: 1;
            padding: 0.75rem 1rem;
            border: none;
            border-radius: 10px;
            text-decoration: none;
            text-align: center;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
            font-size: 0.9rem;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .hero-title {
                font-size: 3rem;
            }
            
            .hero-actions {
                flex-direction: column;
                align-items: center;
            }
            
            .action-btn {
                width: 200px;
                justify-content: center;
            }
            
            .profile-popup {
                min-width: 300px;
                margin: 1rem;
            }
            
            .popup-stats {
                grid-template-columns: 1fr;
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Hero Section Minimal -->
    <section class="hero">
        <div class="hero-particles" id="particlesBg"></div>
        
        <div class="hero-content">
            <h1 class="hero-title">BrainPlayNG</h1>
            <div class="hero-actions">
                <a href="/ai/schemi" class="action-btn primary">
                    <i class="fas fa-robot"></i>
                    Schemi
                </a>
                <a href="/leaderboard" class="action-btn secondary">
                    <i class="fas fa-trophy"></i>
                    Classifiche
                </a>
            </div>
        </div>
    </section>

    <!-- Profile Icon -->
    <div class="profile-icon-wrapper" onclick="showProfilePopup()">
        <div class="profile-icon">
            <img src="https://picsum.photos/seed/brainplayng/100/100.jpg" alt="Profile" class="profile-img">
            <div class="profile-status"></div>
        </div>
    </div>
    
    <!-- Profile Popup -->
    <div class="profile-popup" id="profilePopup">
        <div class="popup-content">
            <div class="popup-header">
                <div class="popup-avatar">
                    <img src="https://picsum.photos/seed/brainplayng/150/150.jpg" alt="Profile">
                </div>
                <div class="popup-info">
                    <h3>BrainPlayNG User</h3>
                    <p>brainplayng@example.com</p>
                </div>
                <button class="close-popup" onclick="hideProfilePopup()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="popup-stats">
                <div class="stat-item">
                    <div class="stat-number">0</div>
                    <div class="stat-label">Giochi</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">0</div>
                    <div class="stat-label">Punteggio</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">0</div>
                    <div class="stat-label">Achievement</div>
                </div>
            </div>
            
            <div class="popup-actions">
                <a href="/auth/login" class="action-btn primary">
                    <i class="fas fa-sign-in-alt"></i> Accedi
                </a>
                <a href="/auth/register" class="action-btn secondary">
                    <i class="fas fa-user-plus"></i> Registrati
                </a>
            </div>
        </div>
    </div>

    <script>
        // Particelle
        function createParticles() {
            const particlesBg = document.getElementById('particlesBg');
            const particleCount = 20;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 30 + 's';
                particle.style.animationDuration = (25 + Math.random() * 10) + 's';
                particlesBg.appendChild(particle);
            }
        }
        
        // Popup profilo
        function showProfilePopup() {
            const popup = document.getElementById('profilePopup');
            popup.classList.add('active');
        }
        
        function hideProfilePopup() {
            const popup = document.getElementById('profilePopup');
            popup.classList.remove('active');
        }
        
        // Chiudi popup cliccando fuori
        document.addEventListener('click', function(event) {
            const popup = document.getElementById('profilePopup');
            const profileIcon = document.querySelector('.profile-icon-wrapper');
            
            if (popup.classList.contains('active') && 
                !popup.contains(event.target) && 
                !profileIcon.contains(event.target)) {
                hideProfilePopup();
            }
        });
        
        // Inizializzazione
        document.addEventListener('DOMContentLoaded', function() {
            createParticles();
        });
    </script>
</body>
</html>
