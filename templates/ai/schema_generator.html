<!-- Responsabile: GABRIELE - Interfaccia IA Schema Generator -->
<!-- Interfaccia utente per generazione schemi con intelligenza artificiale -->

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generatore Schemi IA - BrainPlayNG</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .ai-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 2rem;
        }
        
        /* Stili per Problemi di Logica */
        .logic-info {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1rem;
            backdrop-filter: blur(10px);
        }
        
        .logic-badge {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 120px;
        }
        
        .badge-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .badge-value {
            font-size: 0.9rem;
            font-weight: 700;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.2);
        }
        
        .difficulty-facile .badge-value {
            background: rgba(34, 197, 94, 0.8);
        }
        
        .difficulty-medio .badge-value {
            background: rgba(251, 146, 60, 0.8);
        }
        
        .difficulty-difficile .badge-value {
            background: rgba(239, 68, 68, 0.8);
        }
        
        .logic-problem-container {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            margin: 1.5rem 0;
        }
        
        .problem-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #f3f4f6;
        }
        
        .problem-icon {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }
        
        .problem-title {
            color: #1f2937;
            font-size: 1.25rem;
            font-weight: 700;
            margin: 0;
        }
        
        .problem-content {
            background: #f9fafb;
            border-radius: 12px;
            padding: 1.5rem;
            border-left: 4px solid #667eea;
        }
        
        .problem-text {
            font-size: 1.125rem;
            line-height: 1.7;
            color: #374151;
            font-weight: 500;
        }
        
        .solution-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 2px solid #dcfce7;
        }
        
        .solution-header {
            background: linear-gradient(135deg, #16a34a, #22c55e);
            color: white;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .solution-icon {
            font-size: 2rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .solution-title {
            margin: 0;
            font-size: 1.125rem;
            font-weight: 700;
        }
        
        .solution-content {
            padding: 2rem;
        }
        
        .answer-section, .explanation-section {
            margin-bottom: 2rem;
        }
        
        .answer-section h5, .explanation-section h5 {
            color: #16a34a;
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.75rem;
        }
        
        .answer-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: #1f2937;
            padding: 1rem;
            background: #f0fdf4;
            border-radius: 8px;
            border: 2px solid #bbf7d0;
            text-align: center;
        }
        
        .explanation-text {
            font-size: 1rem;
            line-height: 1.6;
            color: #374151;
            padding: 1rem;
            background: #f9fafb;
            border-radius: 8px;
            border-left: 4px solid #22c55e;
        }
        
        .btn-outline {
            background: transparent;
            border: 2px solid #667eea;
            color: #667eea;
        }
        
        .btn-outline:hover {
            background: #667eea;
            color: white;
        }
        
        .ai-header {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .ai-header h1 {
            color: #667eea;
            margin-bottom: 0.5rem;
        }
        
        .ai-header p {
            color: #6b7280;
            margin: 0;
        }
        
        .generator-form {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group label {
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.5rem;
        }
        
        .form-group select,
        .form-group input,
        .form-group textarea {
            padding: 0.75rem;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }
        
        .form-group select:focus,
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .custom-params {
            background: #f9fafb;
            border-radius: 0.5rem;
            padding: 1.5rem;
            margin-top: 1rem;
        }
        
        .param-item {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .param-item input[type="checkbox"] {
            margin-right: 0.75rem;
            width: 20px;
            height: 20px;
        }
        
        .param-item label {
            margin: 0;
            font-weight: 500;
        }
        
        .btn-container {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }
        
        .btn {
            padding: 0.75rem 2rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-secondary {
            background: #6b7280;
            color: white;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .btn:disabled {
            background: #e5e7eb;
            color: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }
        
        .result-container {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: none;
        }
        
        .result-container.active {
            display: block;
            animation: slideIn 0.5s ease;
        }
        
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .result-title {
            color: #667eea;
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .result-actions {
            display: flex;
            gap: 1rem;
        }
        
        .schema-preview {
            background: #f9fafb;
            border-radius: 0.5rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .schema-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .info-item {
            background: white;
            padding: 1rem;
            border-radius: 0.5rem;
            border-left: 4px solid #667eea;
        }
        
        .info-label {
            font-size: 0.875rem;
            color: #6b7280;
            margin-bottom: 0.25rem;
        }
        
        .info-value {
            font-size: 1.125rem;
            font-weight: 600;
            color: #1f2937;
        }
        
        .loading {
            text-align: center;
            padding: 2rem;
        }
        
        .loading-spinner {
            border: 4px solid #f3f4f6;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .error-message {
            background: #fef2f2;
            color: #dc2626;
            padding: 1rem;
            border-radius: 0.5rem;
            border-left: 4px solid #ef4444;
            margin-bottom: 1rem;
        }
        
        .success-message {
            background: #f0fdf4;
            color: #16a34a;
            padding: 1rem;
            border-radius: 0.5rem;
            border-left: 4px solid #10b981;
            margin-bottom: 1rem;
        }
        
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .btn-container {
                flex-direction: column;
            }
            
            .result-header {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="ai-container">
        <!-- Header -->
        <div class="ai-header">
            <h1>🤖 Generatore di Schemi IA</h1>
            <p>Crea schemi di apprendimento personalizzati con intelligenza artificiale avanzata</p>
        </div>
        
        <!-- Form di Generazione -->
        <div class="generator-form">
            <form id="schemaForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="schemaType">Tipo di Schema *</label>
                        <select id="schemaType" name="schema_type" required>
                            <option value="">Seleziona un tipo...</option>
                            <option value="quiz">📝 Quiz Game</option>
                            <option value="puzzle">🧩 Puzzle Game</option>
                            <option value="math">🔢 Math Exercises</option>
                            <option value="logic">🧠 Logic Problems</option>
                            <option value="language">🌍 Language Learning</option>
                            <option value="science">🔬 Science Learning</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="difficulty">Difficoltà *</label>
                        <select id="difficulty" name="difficulty" required>
                            <option value="easy">🟢 Facile</option>
                            <option value="medium" selected>🟡 Medio</option>
                            <option value="hard">🔴 Difficile</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="subject">Materia (Opzionale)</label>
                        <input type="text" id="subject" name="subject" placeholder="Es: Matematica, Storia...">
                    </div>
                    
                    <div class="form-group">
                        <label for="classGroup">Classe Scolastica (Opzionale)</label>
                        <select id="classGroup" name="class_group">
                            <option value="">Seleziona...</option>
                            <option value="1">1°</option>
                            <option value="2">2°</option>
                            <option value="3">3°</option>
                            <option value="4">4°</option>
                            <option value="5">5°</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="schoolTrack">Indirizzo Scolastico (Opzionale)</label>
                        <select id="schoolTrack" name="school_track">
                            <option value="">Seleziona...</option>
                            <option value="classico">Liceo Classico</option>
                            <option value="scientifico">Liceo Scientifico</option>
                            <option value="linguistico">Liceo Linguistico</option>
                            <option value="artistico">Liceo Artistico</option>
                            <option value="musicale">Liceo Musicale</option>
                            <option value="tecnologico">Liceo Tecnologico</option>
                            <option value="scienze_umane">Liceo Scienze Umane</option>
                            <option value="economico">Istituto Tecnico Economico</option>
                            <option value="tecnologico_industriale">Istituto Tecnico Tecnologico</option>
                            <option value="professionale">Istituto Professionale</option>
                        </select>
                    </div>
                </div>
                
                <!-- Parametri Personalizzati -->
                <div class="custom-params">
                    <h3>⚙️ Parametri Personalizzati</h3>
                    <div id="customParamsContainer">
                        <!-- I parametri verranno caricati dinamicamente -->
                    </div>
                </div>
                
                <!-- Pulsanti Azione -->
                <div class="btn-container">
                    <button type="button" class="btn btn-secondary" onclick="validateConfig()">
                        <i class="fas fa-check"></i> Valida Configurazione
                    </button>
                    <button type="submit" class="btn btn-primary" id="generateBtn">
                        <i class="fas fa-magic"></i> Genera Schema
                    </button>
                </div>
            </form>
        </div>
        
        <!-- Loading State -->
        <div id="loadingState" class="loading" style="display: none;">
            <div class="loading-spinner"></div>
            <p>Generazione schema in corso...</p>
        </div>
        
        <!-- Risultato -->
        <div id="resultContainer" class="result-container">
            <div class="result-header">
                <h2 class="result-title">Schema Generato</h2>
                <div class="result-actions">
                    <button class="btn btn-primary" onclick="downloadSchema()">
                        <i class="fas fa-download"></i> Scarica
                    </button>
                    <button class="btn btn-secondary" onclick="shareSchema()">
                        <i class="fas fa-share"></i> Condividi
                    </button>
                </div>
            </div>
            
            <div id="schemaContent">
                <!-- Contenuto schema generato -->
            </div>
        </div>
    </div>
    
    <script>
        let currentSchema = null;
        let availableThemes = {};
        let currentQuestion = 0;
        let quizAnswers = {};
        
        // Inizializzazione
        document.addEventListener('DOMContentLoaded', function() {
            loadSchemaTypes();
            setupEventListeners();
        });
        
        function loadSchemaTypes() {
            fetch('/api/ai/schema-types')
                .then(response => response.json())
                .then(data => {
                    console.log('Schema types loaded:', data);
                })
                .catch(error => {
                    console.error('Error loading schema types:', error);
                });
        }
        
        function setupEventListeners() {
            document.getElementById('schemaType').addEventListener('change', loadCustomParams);
            document.getElementById('schemaForm').addEventListener('submit', generateSchema);
        }
        
        function loadCustomParams() {
            const schemaType = document.getElementById('schemaType').value;
            const container = document.getElementById('customParamsContainer');
            
            if (!schemaType) {
                container.innerHTML = '<p>Seleziona un tipo di schema per vedere i parametri personalizzati</p>';
                return;
            }
            
            // Carica i temi disponibili
            fetch(`/api/ai/themes/${schemaType}`)
                .then(response => response.json())
                .then(data => {
                    availableThemes = data.themes || [];
                    renderCustomParams(schemaType, availableThemes);
                })
                .catch(error => {
                    console.error('Error loading themes:', error);
                    renderCustomParams(schemaType, []);
                });
        }
        
        function renderCustomParams(schemaType, themes) {
            const container = document.getElementById('customParamsContainer');
            let html = '';
            
            if (schemaType === 'quiz') {
                html = `
                    <div class="param-item">
                        <label for="questionsParam">Numero Domande:</label>
                        <input type="number" id="questionsParam" name="questions" min="5" max="20" value="10">
                    </div>
                    <div class="param-item">
                        <label for="difficultyParam">Difficoltà:</label>
                        <select id="difficultyParam" name="difficulty">
                            <option value="easy">Facile</option>
                            <option value="medium" selected>Medio</option>
                            <option value="hard">Difficile</option>
                        </select>
                    </div>
                `;
            } else if (schemaType === 'puzzle') {
                html = `
                    <div class="param-item">
                        <input type="checkbox" id="sequencePuzzle" name="puzzle_type" value="sequence">
                        <label for="sequencePuzzle">Sequenza</label>
                    </div>
                    <div class="param-item">
                        <input type="checkbox" id="logicPuzzle" name="puzzle_type" value="logic">
                        <label for="logicPuzzle">Logica</label>
                    </div>
                `;
            } else {
                html = '<p>Nessun parametro personalizzato disponibile per questo tipo di schema</p>';
            }
            
            container.innerHTML = html;
        }
        
        function validateConfig() {
            const formData = new FormData(document.getElementById('schemaForm'));
            const config = Object.fromEntries(formData);
            
            fetch('/api/ai/validate-config', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(config)
            })
            .then(response => response.json())
            .then(data => {
                if (data.valid) {
                    showMessage('Configurazione valida! Tempo stimato: ' + data.estimated_time, 'success');
                } else {
                    showMessage('Errore nella configurazione: ' + data.error, 'error');
                }
            })
            .catch(error => {
                showMessage('Errore durante la validazione', 'error');
            });
        }
        
        function generateSchema(event) {
            event.preventDefault();
            
            const formData = new FormData(document.getElementById('schemaForm'));
            const config = Object.fromEntries(formData);
            
            // Raccogli parametri personalizzati
            config.custom_params = {};
            document.querySelectorAll('#customParamsContainer input:checked').forEach(input => {
                config.custom_params[input.name] = input.value;
            });
            
            // Mostra loading
            document.getElementById('loadingState').style.display = 'block';
            document.getElementById('resultContainer').classList.remove('active');
            
            fetch('/api/ai/generate-schema', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(config)
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('loadingState').style.display = 'none';
                
                if (data.success) {
                    currentSchema = data.schema;
                    displaySchema(data.schema, data.config);
                    showMessage('Schema generato con successo!', 'success');
                } else {
                    showMessage('Errore nella generazione: ' + data.error, 'error');
                }
            })
            .catch(error => {
                document.getElementById('loadingState').style.display = 'none';
                showMessage('Errore durante la generazione', 'error');
            });
        }
        
        function displaySchema(schema, config) {
            const container = document.getElementById('schemaContent');
            let html = '';
            
            // Informazioni schema
            html += `
                <div class="schema-info">
                    <div class="info-item">
                        <div class="info-label">Tipo</div>
                        <div class="info-value">${schema.type}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Difficoltà</div>
                        <div class="info-value">${schema.difficulty}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Complessità</div>
                        <div class="info-value">${schema.metadata?.complexity_score || 'N/A'}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Generato</div>
                        <div class="info-value">${new Date(schema.metadata?.generated_at).toLocaleString()}</div>
                    </div>
                </div>
            `;
            
        // Anteprima schema specifica
            if (schema.type === 'quiz') {
                html += `
                    <div class="schema-preview">
                        <h3>📝 Quiz Interattivo</h3>
                        <p><strong>Domande:</strong> ${schema.metadata.total_questions}</p>
                        <p><strong>Categoria:</strong> ${schema.metadata.category}</p>
                        <p><strong>Tempo limite:</strong> ${schema.metadata.time_limit}s</p>
                        <div id="quizContainer" style="margin-top: 1rem;">
                            ${schema.questions.map((q, index) => 
                                `<div class="quiz-question" data-question="${index}" style="display: ${index === 0 ? 'block' : 'none'}; background: #f9fafb; padding: 1.5rem; border-radius: 8px; margin-bottom: 1rem;">
                                    <h4>Domanda ${index + 1}: ${q.question}</h4>
                                    <div class="quiz-options" style="margin-top: 1rem;">
                                        ${q.options.map((option, optIndex) => 
                                            `<div class="quiz-option" data-option="${optIndex}" onclick="selectQuizOption(${index}, ${optIndex})" style="background: white; border: 2px solid #e5e7eb; border-radius: 8px; padding: 1rem; margin-bottom: 0.5rem; cursor: pointer; transition: all 0.3s ease;">
                                                ${option}
                                            </div>`
                                        ).join('')}
                                    </div>
                                    <div id="feedback-${index}" style="margin-top: 1rem; font-weight: 600; display: none;"></div>
                                    <div style="margin-top: 1rem; display: flex; gap: 1rem;">
                                        ${index > 0 ? `<button class="btn btn-secondary" onclick="previousQuestion(${index})">← Precedente</button>` : ''}
                                        ${index < schema.questions.length - 1 ? `<button class="btn btn-primary" onclick="nextQuestion(${index})">Successivo →</button>` : `<button class="btn btn-success" onclick="showQuizResults()">🏆 Vedi Risultati</button>`}
                                    </div>
                                </div>`
                            ).join('')}
                        </div>
                    </div>
                `;
            } else if (schema.type === 'logic') {
                html += `
                    <div class="schema-preview">
                        <h3>🧠 Problema di Logica</h3>
                        <div class="logic-info" style="display: flex; gap: 2rem; margin-bottom: 1.5rem; flex-wrap: wrap;">
                            <div class="logic-badge">
                                <span class="badge-label">Categoria:</span>
                                <span class="badge-value">${schema.category || 'Logica'}</span>
                            </div>
                            <div class="logic-badge">
                                <span class="badge-label">Difficoltà:</span>
                                <span class="badge-value difficulty-${schema.difficulty}">${schema.difficulty}</span>
                            </div>
                            <div class="logic-badge">
                                <span class="badge-label">Tipo:</span>
                                <span class="badge-value">${schema.metadata?.logic_type || 'classico'}</span>
                            </div>
                        </div>
                        <div class="logic-problem-container">
                            <div class="problem-header">
                                <div class="problem-icon">🤔</div>
                                <h4 class="problem-title">Risolvi questo problema di logica:</h4>
                            </div>
                            <div class="problem-content">
                                <div class="problem-text">
                                    ${schema.question}
                                </div>
                            </div>
                        </div>
                        <div class="logic-controls" style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: center;">
                            <button class="btn btn-primary" onclick="showLogicAnswer()">
                                <i class="fas fa-lightbulb"></i> Mostra Soluzione
                            </button>
                            <button class="btn btn-secondary" onclick="hideLogicAnswer()">
                                <i class="fas fa-eye-slash"></i> Nascondi
                            </button>
                            <button class="btn btn-outline" onclick="generateNewLogicProblem()">
                                <i class="fas fa-sync"></i> Nuovo Problema
                            </button>
                        </div>
                        <div id="logicAnswer" style="display: none; margin-top: 2rem;">
                            <div class="solution-card">
                                <div class="solution-header">
                                    <div class="solution-icon">✅</div>
                                    <h4 class="solution-title">Soluzione e Spiegazione</h4>
                                </div>
                                <div class="solution-content">
                                    <div class="answer-section">
                                        <h5>Risposta Corretta:</h5>
                                        <div class="answer-value">${schema.answer}</div>
                                    </div>
                                    <div class="explanation-section">
                                        <h5>Spiegazione Dettagliata:</h5>
                                        <div class="explanation-text">${schema.explanation}</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            container.innerHTML = html;
            document.getElementById('resultContainer').classList.add('active');
            
            // Resetta stato interattivo
            currentQuestion = 0;
            quizAnswers = {};
            
            // Se è un problema di logica, aggiungi il pulsante "Ho risolto da solo"
            if (schema.type === 'logic') {
                setTimeout(addSolveButton, 100);
            }
        }
        
        // Funzioni per Problemi di Logica
        function showLogicAnswer() {
            const answerDiv = document.getElementById('logicAnswer');
            if (answerDiv) {
                answerDiv.style.display = 'block';
                answerDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                
                // Salva che l'utente ha visualizzato la soluzione
                if (currentSchema && currentSchema.type === 'logic') {
                    saveLogicProblem(false); // Non risolto autonomamente
                }
            }
        }
        
        function hideLogicAnswer() {
            const answerDiv = document.getElementById('logicAnswer');
            if (answerDiv) {
                answerDiv.style.display = 'none';
            }
        }
        
        // Funzione per salvare il problema di logica risolto
        async function saveLogicProblem(solved = true) {
            try {
                const gameData = {
                    category: currentSchema.category || 'logica',
                    difficulty: currentSchema.difficulty || 'medio',
                    solved: solved,
                    question: currentSchema.question,
                    answer: currentSchema.answer,
                    explanation: currentSchema.explanation
                };
                
                const response = await fetch('/auth/api/user/add-game', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        type: 'logic',
                        data: gameData
                    })
                });
                
                if (response.ok) {
                    console.log('Problema di logica salvato nello storico');
                }
            } catch (error) {
                console.error('Errore nel salvare il problema di logica:', error);
            }
        }
        
        // Aggiungi pulsante "Ho risolto da solo"
        function addSolveButton() {
            const controls = document.querySelector('.logic-controls');
            if (controls && !controls.querySelector('.solve-btn')) {
                const solveBtn = document.createElement('button');
                solveBtn.className = 'btn btn-success solve-btn';
                solveBtn.innerHTML = '<i class="fas fa-check"></i> Ho risolto da solo';
                solveBtn.onclick = () => {
                    saveLogicProblem(true); // Risolto autonomamente
                    alert('Ottimo lavoro! Problema segnato come risolto autonomamente.');
                };
                controls.appendChild(solveBtn);
            }
        }
        
        function generateNewLogicProblem() {
            // Nascondi la soluzione corrente
            hideLogicAnswer();
            
            // Mostra loading
            const container = document.getElementById('schemaContent');
            container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Generazione nuovo problema...</p></div>';
            
            // Ricarica il form e genera nuovo schema
            setTimeout(() => {
                generateSchema();
            }, 1000);
        }
        
        // Funzioni per Quiz
        function selectQuizOption(questionIndex, optionIndex) {
            if (!currentSchema || currentSchema.type !== 'quiz') return;
            
            const question = currentSchema.questions[questionIndex];
            const isCorrect = optionIndex === question.correct;
            
            // Salva risposta
            quizAnswers[questionIndex] = optionIndex;
            
            // Visualizza feedback
            const options = document.querySelectorAll(`[data-question="${questionIndex}"] .quiz-option`);
            options.forEach((opt, idx) => {
                opt.style.pointerEvents = 'none';
                if (idx === question.correct) {
                    opt.style.background = '#dcfce7';
                    opt.style.borderColor = '#16a34a';
                } else if (idx === optionIndex && !isCorrect) {
                    opt.style.background = '#fef2f2';
                    opt.style.borderColor = '#dc2626';
                }
            });
            
            // Mostra feedback
            const feedback = document.getElementById(`feedback-${questionIndex}`);
            feedback.style.display = 'block';
            feedback.innerHTML = isCorrect ? 
                '✅ Risposta Corretta!' : 
                `❌ Risposta Sbagliata. La risposta corretta è: ${question.options[question.correct]}`;
            feedback.style.color = isCorrect ? '#16a34a' : '#dc2626';
        }
        
        function nextQuestion() {
            if (!currentSchema || currentSchema.type !== 'quiz') return;
            
            if (currentQuestion < currentSchema.questions.length - 1) {
                document.querySelector(`[data-question="${currentQuestion}"]`).style.display = 'none';
                currentQuestion++;
                document.querySelector(`[data-question="${currentQuestion}"]`).style.display = 'block';
                updateQuizNavigation();
            }
        }
        
        function previousQuestion() {
            if (!currentSchema || currentSchema.type !== 'quiz') return;
            
            if (currentQuestion > 0) {
                document.querySelector(`[data-question="${currentQuestion}"]`).style.display = 'none';
                currentQuestion--;
                document.querySelector(`[data-question="${currentQuestion}"]`).style.display = 'block';
                updateQuizNavigation();
            }
        }
        
        function updateQuizNavigation() {
            document.getElementById('questionCounter').textContent = `Domanda ${currentQuestion + 1}/${currentSchema.questions.length}`;
            document.getElementById('prevBtn').disabled = currentQuestion === 0;
            document.getElementById('nextBtn').disabled = currentQuestion === currentSchema.questions.length - 1;
        }
        
        function showQuizSolution() {
            if (!currentSchema || currentSchema.type !== 'quiz') return;
            
            currentSchema.questions.forEach((q, index) => {
                const options = document.querySelectorAll(`[data-question="${index}"] .quiz-option`);
                options.forEach((opt, idx) => {
                    opt.style.pointerEvents = 'none';
                    if (idx === q.correct) {
                        opt.style.background = '#dcfce7';
                        opt.style.borderColor = '#16a34a';
                    }
                });
                
                const feedback = document.getElementById(`feedback-${index}`);
                feedback.style.display = 'block';
                feedback.innerHTML = `✅ Risposta Corretta: ${q.options[q.correct]}`;
                feedback.style.color = '#16a34a';
            });
        }
        
        function downloadSchema() {
            if (!currentSchema) return;
            
            const dataStr = JSON.stringify(currentSchema, null, 2);
            const dataBlob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(dataBlob);
            
            const link = document.createElement('a');
            link.href = url;
            link.download = `schema_${currentSchema.type}_${Date.now()}.json`;
            link.click();
            
            URL.revokeObjectURL(url);
        }
        
        function shareSchema() {
            if (!currentSchema) return;
            
            // Implementa condivisione (es. copia link, email, etc.)
            const shareText = `Ho generato uno schema ${currentSchema.type} con BrainPlayNG!`;
            
            if (navigator.share) {
                navigator.share({
                    title: 'Schema BrainPlayNG',
                    text: shareText
                });
            } else {
                navigator.clipboard.writeText(shareText);
                showMessage('Link copiato negli appunti!', 'success');
            }
        }
        
        function showMessage(message, type) {
            // Rimuovi messaggi esistenti
            const existingMessages = document.querySelectorAll('.error-message, .success-message');
            existingMessages.forEach(msg => msg.remove());
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `${type}-message`;
            messageDiv.textContent = message;
            
            const form = document.querySelector('.generator-form');
            form.insertBefore(messageDiv, form.firstChild);
            
            // Rimuovi dopo 5 secondi
            setTimeout(() => {
                messageDiv.remove();
            }, 5000);
        }
    </script>
</body>
</html>
