<!-- Header Component -->
<header class="header">
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h1>🧠 BrainPlayNG</h1>
            </div>
            <div class="nav-links">
                <a href="#features">Funzionalità</a>
                <a href="#about">Chi Siamo</a>
                {% if 'user_id' in session %}
                    <span class="user-welcome">👋 Ciao, {{ session.username }}!</span>
                    <a href="/auth/logout" class="btn btn-secondary">Logout</a>
                {% else %}
                    <a href="/auth/login" class="btn btn-primary">Accedi</a>
                    <a href="/auth/register" class="btn btn-secondary">Registrati</a>
                {% endif %}
            </div>
        </div>
    </nav>
</header>
