<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game - BrainPlayNG</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .game-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        
        .game-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .game-stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        .stat-box {
            background: rgba(255,255,255,0.1);
            padding: 15px 25px;
            border-radius: 10px;
            margin: 5px;
            backdrop-filter: blur(10px);
        }
        
        .stat-label {
            font-size: 0.9em;
            opacity: 0.8;
            margin-bottom: 5px;
        }
        
        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
        }
        
        .level-selector {
            margin: 20px 0;
        }
        
        .level-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            padding: 10px 20px;
            margin: 0 5px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1em;
        }
        
        .level-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        
        .level-btn.active {
            background: white;
            color: #667eea;
            border-color: white;
        }
        
        .game-board {
            display: grid;
            gap: 15px;
            margin: 30px auto;
            max-width: 600px;
            perspective: 1000px;
        }
        
        .game-board.facile {
            grid-template-columns: repeat(4, 1fr);
        }
        
        .game-board.medio {
            grid-template-columns: repeat(4, 1fr);
        }
        
        .game-board.difficile {
            grid-template-columns: repeat(4, 1fr);
        }
        
        .card {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 15px;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        
        .card.flipped {
            transform: rotateY(180deg);
        }
        
        .card.matched {
            animation: matchPulse 0.6s ease;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            backface-visibility: hidden;
        }
        
        .card-front {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 2em;
            font-weight: bold;
        }
        
        .card-back {
            background: white;
            transform: rotateY(180deg);
            font-size: 3em;
        }
        
        @keyframes matchPulse {
            0% { transform: scale(1) rotateY(180deg); }
            50% { transform: scale(1.1) rotateY(180deg); }
            100% { transform: scale(1) rotateY(180deg); }
        }
        
        .controls {
            margin: 30px 0;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1.1em;
            margin: 0 10px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        
        .victory-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .victory-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            animation: victoryBounce 0.6s ease;
        }
        
        @keyframes victoryBounce {
            0% { transform: scale(0); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .victory-title {
            font-size: 2.5em;
            color: #667eea;
            margin-bottom: 20px;
        }
        
        .victory-stats {
            margin: 20px 0;
            font-size: 1.2em;
        }
        
        .leaderboard {
            margin-top: 30px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .leaderboard h3 {
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            margin: 5px 0;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .leaderboard-item:first-child {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>🧠 Memory Game</h1>
            <p>Trova tutte le coppie di carte!</p>
            
            <div class="game-stats">
                <div class="stat-box">
                    <div class="stat-label">Mosse</div>
                    <div class="stat-value" id="moves">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Punteggio</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Coppie</div>
                    <div class="stat-value" id="pairs">0/4</div>
                </div>
            </div>
            
            <div class="level-selector">
                <button class="level-btn active" data-level="facile">Facile</button>
                <button class="level-btn" data-level="medio">Medio</button>
                <button class="level-btn" data-level="difficile">Difficile</button>
            </div>
        </div>
        
        <div class="game-board facile" id="gameBoard">
            <!-- Le carte verranno generate dinamicamente -->
        </div>
        
        <div class="controls">
            <button class="btn" onclick="startNewGame()">Nuova Partita</button>
            <button class="btn" onclick="showLeaderboard()">Classifica</button>
        </div>
        
        <div class="leaderboard" id="leaderboard" style="display: none;">
            <h3>🏆 Classifica</h3>
            <div id="leaderboardList">
                <!-- Classifica verrà caricata dinamicamente -->
            </div>
        </div>
    </div>
    
    <div class="victory-modal" id="victoryModal">
        <div class="victory-content">
            <div class="victory-title">🎉 Vittoria!</div>
            <div class="victory-stats">
                <p>Mosse: <span id="finalMoves">0</span></p>
                <p>Punteggio: <span id="finalScore">0</span></p>
                <p>Tempo: <span id="finalTime">0</span> secondi</p>
            </div>
            <button class="btn" onclick="closeVictory()">Gioca Ancora</button>
        </div>
    </div>
    
    <script>
        let gameState = {
            cards: [],
            flipped: [],
            matched: [],
            moves: 0,
            score: 0,
            level: 'facile',
            isProcessing: false
        };
        
        // Inizializza il gioco
        function initGame() {
            setupLevelButtons();
            startNewGame();
        }
        
        // Configura i pulsanti di livello
        function setupLevelButtons() {
            document.querySelectorAll('.level-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    gameState.level = this.dataset.level;
                    startNewGame();
                });
            });
        }
        
        // Inizia una nuova partita
        async function startNewGame() {
            try {
                const response = await fetch(`/game/api/new-game?level=${gameState.level}`);
                const data = await response.json();
                
                gameState.cards = data.cards;
                gameState.flipped = [];
                gameState.matched = [];
                gameState.moves = 0;
                gameState.score = 0;
                gameState.isProcessing = false;
                
                updateDisplay();
                renderGameBoard();
                updatePairsDisplay();
                
                // Aggiorna la griglia in base al livello
                const board = document.getElementById('gameBoard');
                board.className = `game-board ${gameState.level}`;
                
            } catch (error) {
                console.error('Errore nell\'avvio del gioco:', error);
            }
        }
        
        // Renderizza il tabellone di gioco
        function renderGameBoard() {
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';
            
            gameState.cards.forEach((symbol, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = index;
                card.onclick = () => flipCard(index);
                
                card.innerHTML = `
                    <div class="card-face card-front">?</div>
                    <div class="card-face card-back">${symbol}</div>
                `;
                
                board.appendChild(card);
            });
        }
        
        // Gira una carta
        async function flipCard(index) {
            if (gameState.isProcessing) return;
            if (gameState.flipped.includes(index) || gameState.matched.includes(index)) return;
            if (gameState.flipped.length >= 2) return;
            
            const card = document.querySelector(`[data-index="${index}"]`);
            card.classList.add('flipped');
            gameState.flipped.push(index);
            
            if (gameState.flipped.length === 2) {
                gameState.isProcessing = true;
                
                try {
                    const response = await fetch('/game/api/flip-card', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ index: index })
                    });
                    
                    const data = await response.json();
                    
                    if (data.error) {
                        console.error(data.error);
                        return;
                    }
                    
                    gameState.moves = data.moves;
                    gameState.score = data.score;
                    gameState.matched = data.matched;
                    
                    updateDisplay();
                    updatePairsDisplay();
                    
                    if (data.game_won) {
                        showVictory(data);
                    } else if (!data.matched) {
                        // Le carte non corrispondono, rigirale dopo un delay
                        setTimeout(async () => {
                            await resetFlipped();
                        }, 1000);
                    } else {
                        // Le carte corrispondono, aggiungi l'animazione
                        gameState.flipped.forEach(i => {
                            document.querySelector(`[data-index="${i}"]`).classList.add('matched');
                        });
                        gameState.flipped = [];
                        gameState.isProcessing = false;
                    }
                    
                } catch (error) {
                    console.error('Errore nel girare la carta:', error);
                    gameState.isProcessing = false;
                }
            }
        }
        
        // Resetta le carte girate che non corrispondono
        async function resetFlipped() {
            try {
                await fetch('/game/api/reset-flipped');
                
                gameState.flipped.forEach(index => {
                    const card = document.querySelector(`[data-index="${index}"]`);
                    card.classList.remove('flipped');
                });
                
                gameState.flipped = [];
                gameState.isProcessing = false;
                
            } catch (error) {
                console.error('Errore nel reset delle carte:', error);
            }
        }
        
        // Aggiorna il display
        function updateDisplay() {
            document.getElementById('moves').textContent = gameState.moves;
            document.getElementById('score').textContent = gameState.score;
        }
        
        // Aggiorna il display delle coppie
        function updatePairsDisplay() {
            const totalPairs = gameState.cards.length / 2;
            const foundPairs = gameState.matched.length / 2;
            document.getElementById('pairs').textContent = `${foundPairs}/${totalPairs}`;
        }
        
        // Mostra la vittoria
        function showVictory(data) {
            document.getElementById('finalMoves').textContent = data.moves;
            document.getElementById('finalScore').textContent = data.score;
            document.getElementById('finalTime').textContent = Math.round(data.time);
            document.getElementById('victoryModal').style.display = 'flex';
        }
        
        // Chiudi il modale di vittoria
        function closeVictory() {
            document.getElementById('victoryModal').style.display = 'none';
            startNewGame();
        }
        
        // Mostra la classifica
        async function showLeaderboard() {
            const leaderboard = document.getElementById('leaderboard');
            
            if (leaderboard.style.display === 'none') {
                try {
                    const response = await fetch('/game/api/leaderboard');
                    const data = await response.json();
                    
                    const leaderboardList = document.getElementById('leaderboardList');
                    leaderboardList.innerHTML = '';
                    
                    data.forEach((entry, index) => {
                        const item = document.createElement('div');
                        item.className = 'leaderboard-item';
                        item.innerHTML = `
                            <span>${index + 1}. ${entry.name}</span>
                            <span>${entry.score} pts - ${entry.level}</span>
                        `;
                        leaderboardList.appendChild(item);
                    });
                    
                    leaderboard.style.display = 'block';
                } catch (error) {
                    console.error('Errore nel caricare la classifica:', error);
                }
            } else {
                leaderboard.style.display = 'none';
            }
        }
        
        // Inizializza quando la pagina è caricata
        document.addEventListener('DOMContentLoaded', initGame);
    </script>
</body>
</html>
