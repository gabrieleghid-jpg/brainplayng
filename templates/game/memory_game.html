<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game - BrainPlayNG</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='games/memory-game.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>🧠 Memory Game</h1>
            <p>Trova tutte le coppie di carte!</p>
            
            <div class="game-stats">
                <div class="stat-box">
                    <div class="stat-label">Mosse</div>
                    <div class="stat-value" id="moves">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Tempo</div>
                    <div class="stat-value" id="time">00:00</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Punteggio</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Coppie</div>
                    <div class="stat-value" id="pairs">0/4</div>
                </div>
            </div>
            
            <div class="level-selector">
                <button class="level-btn active" data-level="facile">Facile</button>
                <button class="level-btn" data-level="medio">Medio</button>
                <button class="level-btn" data-level="difficile">Difficile</button>
            </div>
        </div>
        
        <div class="game-board facile" id="gameBoard">
            <!-- Le carte verranno generate dinamicamente -->
        </div>
        
        <div class="controls">
            <button class="btn" onclick="startNewGame()">Nuova Partita</button>
            <button class="btn" onclick="showLeaderboard()">Classifica</button>
        </div>
        
        <div class="leaderboard" id="leaderboard" style="display: none;">
            <h3>🏆 Classifica</h3>
            <div id="leaderboardList">
                <!-- Classifica verrà caricata dinamicamente -->
            </div>
        </div>
    </div>
    
    <div class="victory-modal" id="victoryModal">
        <div class="victory-content">
            <div class="victory-title">🎉 Vittoria!</div>
            <div class="victory-stats">
                <p>Mosse: <span id="finalMoves">0</span></p>
                <p>Punteggio: <span id="finalScore">0</span></p>
                <p>Tempo: <span id="finalTime">0</span> secondi</p>
            </div>
            <button class="btn" onclick="closeVictory()">Gioca Ancora</button>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='games/memory-game.js') }}"></script>
</body>
</html>
