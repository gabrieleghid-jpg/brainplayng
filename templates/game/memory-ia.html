<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory - BrainPlayNG</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        .memory-ia-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 2rem;
        }
        
        .memory-ia-header {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .memory-ia-header h1 {
            color: #667eea;
            margin-bottom: 0.5rem;
            font-size: 2.5rem;
            font-weight: 800;
        }
        
        .memory-ia-header p {
            color: #6b7280;
            margin: 0;
            font-size: 1.125rem;
        }
        
        .generator-form {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group label {
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.5rem;
        }
        
        .form-group input,
        .form-group select {
            padding: 0.75rem;
            border: 2px solid #e5e7eb;
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }
        
        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
            border: 2px solid #e5e7eb;
        }
        
        .btn-secondary:hover {
            background: #e5e7eb;
        }
        
        .memory-preview {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
        }
        
        .memory-preview h3 {
            color: #1f2937;
            margin-bottom: 1rem;
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .memory-stats {
            display: flex;
            gap: 2rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        
        .memory-stat {
            text-align: center;
        }
        
        .memory-stat-number {
            font-size: 1.5rem;
            font-weight: 800;
            color: #667eea;
            display: block;
            margin-bottom: 0.25rem;
        }
        
        .memory-stat-label {
            font-size: 0.875rem;
            color: #6b7280;
        }
        
        .memory-game-board {
            display: grid;
            gap: 1rem;
            margin: 2rem auto;
            max-width: 600px;
        }
        
        .memory-card {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            position: relative;
            transform-style: preserve-3d;
        }
        
        .memory-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        
        .memory-card.flipped {
            background: linear-gradient(135deg, #10b981, #059669);
            transform: rotateY(180deg);
        }
        
        .memory-card.matched {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            animation: matchPulse 0.6s ease;
            pointer-events: none;
        }
        
        .memory-card-front,
        .memory-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1rem;
            backface-visibility: hidden;
        }
        
        .memory-card-front {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-weight: bold;
        }
        
        .memory-card-back {
            background: white;
            transform: rotateY(180deg);
            font-size: 2.5rem;
        }
        
        @keyframes matchPulse {
            0% { transform: scale(1) rotateY(180deg); }
            50% { transform: scale(1.1) rotateY(180deg); }
            100% { transform: scale(1) rotateY(180deg); }
        }
        
        .memory-controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }
        
        .memory-info {
            background: #f9fafb;
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        
        .memory-info h4 {
            color: #1f2937;
            margin-bottom: 0.5rem;
        }
        
        .memory-info p {
            color: #6b7280;
            margin: 0;
        }
        
        .loading {
            text-align: center;
            padding: 3rem;
            color: #6b7280;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e5e7eb;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            margin: 0 auto 1rem;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .memory-ia-container {
                padding: 1rem;
            }
            
            .memory-game-board {
                gap: 0.5rem;
                max-width: 100%;
            }
            
            .memory-card {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="memory-ia-container">
        <!-- Header -->
        <div class="memory-ia-header">
            <h1>🧠 Memory</h1>
            <p>Genera un Memory Game personalizzato con l'intelligenza artificiale</p>
        </div>
        
        <!-- Form di Generazione -->
        <div class="generator-form">
            <form id="memoryForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="pairsNumber">Numero Coppie *</label>
                        <input type="number" id="pairsNumber" name="pairs" min="2" max="12" value="6" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="themeType">Tema *</label>
                        <select id="themeType" name="theme" required>
                            <option value="animals">🐾 Animali</option>
                            <option value="fruits">🍎 Frutta</option>
                            <option value="sports">⚽ Sport</option>
                            <option value="emojis">😀 Emoji</option>
                            <option value="nature">🌿 Natura</option>
                            <option value="food">🍕 Cibo</option>
                            <option value="vehicles">🚗 Veicoli</option>
                            <option value="music">🎵 Musica</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="difficultyLevel">Difficoltà *</label>
                        <select id="difficultyLevel" name="difficulty" required>
                            <option value="easy">Facile</option>
                            <option value="medium" selected>Medio</option>
                            <option value="hard">Difficile</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-row">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-magic"></i>
                        Genera Memory Game
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="resetForm()">
                        <i class="fas fa-redo"></i>
                        Reset
                    </button>
                </div>
            </form>
        </div>
        
        <!-- Anteprima del Gioco -->
        <div id="memoryPreview" class="memory-preview" style="display: none;">
            <h3>🎮 Memory Game Generato</h3>
            
            <div class="memory-info">
                <h4>Configurazione del Gioco</h4>
                <p id="gameConfig"></p>
            </div>
            
            <div class="memory-stats">
                <div class="memory-stat">
                    <span class="memory-stat-number" id="movesCount">0</span>
                    <span class="memory-stat-label">Mosse</span>
                </div>
                <div class="memory-stat">
                    <span class="memory-stat-number" id="matchesCount">0</span>
                    <span class="memory-stat-label">Coppie</span>
                </div>
                <div class="memory-stat">
                    <span class="memory-stat-number" id="scoreCount">0</span>
                    <span class="memory-stat-label">Punteggio</span>
                </div>
            </div>
            
            <div id="memoryGameBoard" class="memory-game-board">
                <!-- Le carte verranno generate dinamicamente -->
            </div>
            
            <div class="memory-controls">
                <button class="btn btn-primary" onclick="resetGame()">
                    <i class="fas fa-redo"></i>
                    Ricomincia
                </button>
                <button class="btn btn-secondary" onclick="generateNewGame()">
                    <i class="fas fa-plus"></i>
                    Nuovo Gioco
                </button>
            </div>
        </div>
        
        <!-- Loading State -->
        <div id="loadingState" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Generazione Memory Game in corso...</p>
        </div>
    </div>
    
    <script>
        let currentMemoryGame = null;
        let flippedCards = [];
        let matchedPairs = [];
        let moves = 0;
        let score = 0;
        
        // Temi per il Memory Game
        const THEMES = {
            animals: ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼', '🐨', '🐯', '🦁', '🐮', '🐷', '🐸', '🐵', '🐔', '🐧', '🐦', '🐤', '🦆', '🦅', '🦉', '🦇', '🐺', '🐗', '🐴', '🦄', '🐝', '🐛', '🦋', '🐌', '🐞', '🐜', '🦟', '🦗', '🕷️', '🦂'],
            fruits: ['🍎', '🍊', '🍋', '🍌', '🍉', '🍇', '🍓', '🍒', '🍑', '🥭', '🍍', '🥥', '🥝', '🍅', '🍆', '🥑', '🥦', '🥬', '🥒', '🌶️', '🫑', '🌽', '🥕', '🫒', '🧄', '🧅', '🥔', '🍠', '🥐', '🥯', '🍞', '🥖', '🥨', '🧀', '🥚', '🍳', '🧈'],
            sports: ['⚽', '🏀', '🏈', '⚾', '🥎', '🎾', '🏐', '🏉', '🥏', '🎱', '🪀', '🏓', '🏸', '🏒', '🏑', '🥍', '🏏', '🪃', '🥅', '⛳', '🪁', '🏹', '🎣', '🤿', '🥊', '🥋', '🎽', '🏋️', '🤼', '🤸', '⛹️', '🤺', '🧘', '🏇', '🧗'],
            emojis: ['😀', '😃', '😄', '😁', '😆', '😅', '😂', '🤣', '😊', '😇', '🙂', '🙃', '😉', '😌', '😍', '🥰', '😘', '😗', '😙', '😚', '😋', '😛', '😝', '😜', '🤪', '🤨', '🧐', '🤓', '😎', '🤩', '🥳', '😏', '😒', '😞', '😔'],
            nature: ['🌸', '🌺', '🌻', '🌷', '🌹', '🥀', '🌲', '🌳', '🌴', '🌵', '🌾', '🌿', '🍀', '🍁', '🍂', '🍃', '🌱', '🌼', '🌻', '🌺', '💐', '🌷', '🌹', '🥀', '🌵', '🌲', '🌳', '🌴', '🌿', '🍀', '🍁', '🍂', '🍃'],
            food: ['🍕', '🍔', '🍟', '🌭', '🍿', '🥨', '🥪', '🌮', '🌯', '🫔', '🥗', '🥘', '🫕', '🥫', '🍝', '🍜', '🍲', '🍛', '🍣', '🍱', '🍤', '🍙', '🍚', '🍛', '🍜', '🍝', '🍠', '🍢', '🍡', '🥟', '🥠', '🥡', '🦀', '🦞', '🦐'],
            vehicles: ['🚗', '🚕', '🚙', '🚌', '🚎', '🏎️', '🚓', '🚑', '🚒', '🚐', '🛻', '🚚', '🚛', '🚜', '🏍️', '🛵', '🚲', '🛴', '🚲', '🛹', '🛼', '🚁', '🛸', '🚀', '✈️', '🛩️', '🛫', '🛬', '🪂', '🚂', '🚆', '🚄', '🚅', '🚈', '🚝', '🚞', '🚋'],
            music: ['🎵', '🎶', '🎼', '🎹', '🎸', '🎺', '🎻', '🥁', '🪘', '🎧', '🎤', '🎙️', '📻', '📷', '📹', '🎬', '🎮', '🕹️', '🎰', '🧩', '🎳', '🎯', '🎲', '🎪', '🎭', '🎨', '🖌️', '🖍️', '📝', '📄', '📃', '📋', '📆']
        };
        
        // Inizializzazione
        document.addEventListener('DOMContentLoaded', function() {
            setupEventListeners();
        });
        
        function setupEventListeners() {
            document.getElementById('memoryForm').addEventListener('submit', function(e) {
                e.preventDefault();
                generateMemoryGame();
            });
        }
        
        function generateMemoryGame() {
            const formData = new FormData(document.getElementById('memoryForm'));
            const pairs = parseInt(formData.get('pairs'));
            const theme = formData.get('theme');
            const difficulty = formData.get('difficulty');
            
            // Mostra loading
            document.getElementById('loadingState').style.display = 'block';
            document.getElementById('memoryPreview').style.display = 'none';
            
            // Simula chiamata API
            setTimeout(() => {
                createMemoryGame(pairs, theme, difficulty);
            }, 1000);
        }
        
        function createMemoryGame(pairs, theme, difficulty) {
            // Ottieni simboli dal tema
            const symbols = THEMES[theme] || THEMES.emojis;
            const selectedSymbols = symbols.slice(0, pairs);
            
            // Crea carte duplicate
            const cards = [...selectedSymbols, ...selectedSymbols];
            
            // Mescola carte
            const shuffledCards = shuffleArray(cards);
            
            // Configura griglia in base al numero di coppie
            const gridCols = Math.ceil(Math.sqrt(shuffledCards.length));
            const board = document.getElementById('memoryGameBoard');
            board.style.gridTemplateColumns = `repeat(${gridCols}, 1fr)`;
            
            // Genera HTML carte
            board.innerHTML = '';
            shuffledCards.forEach((symbol, index) => {
                const card = createMemoryCard(symbol, index);
                board.appendChild(card);
            });
            
            // Resetta stato gioco
            currentMemoryGame = shuffledCards;
            flippedCards = [];
            matchedPairs = [];
            moves = 0;
            score = 0;
            
            // Aggiorna UI
            updateGameStats();
            document.getElementById('gameConfig').innerHTML = `
                <strong>Coppie:</strong> ${pairs} | 
                <strong>Tema:</strong> ${theme} | 
                <strong>Difficoltà:</strong> ${difficulty}
            `;
            
            // Nascondi loading, mostra gioco
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('memoryPreview').style.display = 'block';
        }
        
        function createMemoryCard(symbol, index) {
            const card = document.createElement('div');
            card.className = 'memory-card';
            card.dataset.index = index;
            card.dataset.symbol = symbol;
            
            card.innerHTML = `
                <div class="memory-card-front">?</div>
                <div class="memory-card-back">${symbol}</div>
            `;
            
            card.addEventListener('click', () => flipCard(index));
            
            return card;
        }
        
        function flipCard(index) {
            const card = document.querySelector(`[data-index="${index}"]`);
            
            // Controlli di gioco
            if (flippedCards.includes(index) || matchedPairs.includes(index) || flippedCards.length >= 2) {
                return;
            }
            
            // Gira carta
            card.classList.add('flipped');
            flippedCards.push(index);
            
            // Controlla se due carte sono girate
            if (flippedCards.length === 2) {
                moves++;
                updateGameStats();
                
                setTimeout(() => {
                    checkMatch();
                }, 1000);
            }
        }
        
        function checkMatch() {
            const [card1, card2] = flippedCards;
            const card1Element = document.querySelector(`[data-index="${card1}"]`);
            const card2Element = document.querySelector(`[data-index="${card2}"]`);
            
            if (card1Element.dataset.symbol === card2Element.dataset.symbol) {
                // Coppia trovata!
                card1Element.classList.add('matched');
                card2Element.classList.add('matched');
                matchedPairs.push(card1, card2);
                
                // Calcola punteggio
                score += 100;
                updateGameStats();
                
                // Controlla vittoria
                if (matchedPairs.length === currentMemoryGame.length) {
                    setTimeout(() => {
                        alert(`🎉 Completato in ${moves} mosse con punteggio ${score}!`);
                    }, 500);
                }
            } else {
                // Coppia sbagliata, rigira carte
                card1Element.classList.remove('flipped');
                card2Element.classList.remove('flipped');
            }
            
            flippedCards = [];
        }
        
        function updateGameStats() {
            document.getElementById('movesCount').textContent = moves;
            document.getElementById('matchesCount').textContent = matchedPairs.length / 2;
            document.getElementById('scoreCount').textContent = score;
        }
        
        function resetGame() {
            if (!currentMemoryGame) return;
            
            // Rigira tutte le carte
            document.querySelectorAll('.memory-card').forEach(card => {
                card.classList.remove('flipped', 'matched');
            });
            
            // Resetta stato
            flippedCards = [];
            matchedPairs = [];
            moves = 0;
            score = 0;
            
            updateGameStats();
        }
        
        function generateNewGame() {
            document.getElementById('memoryForm').reset();
            document.getElementById('memoryPreview').style.display = 'none';
            document.getElementById('memoryForm').scrollIntoView({ behavior: 'smooth' });
        }
        
        function resetForm() {
            document.getElementById('memoryForm').reset();
        }
        
        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }
    </script>
</body>
</html>
