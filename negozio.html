<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Negozio - BrainPlay</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        .shop-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .shop-header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        .shop-header h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .shop-header p {
            font-size: 18px;
            opacity: 0.9;
        }

        .credits-display {
            background: rgba(255,255,255,0.2);
            padding: 15px 25px;
            border-radius: 20px;
            font-size: 20px;
            font-weight: bold;
            display: inline-block;
            margin: 20px 0;
        }

        .shop-categories {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .category-btn {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 2px solid transparent;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .category-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .category-btn.active {
            background: white;
            color: #667eea;
            border-color: white;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .product-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .product-image {
            height: 200px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: white;
        }

        .product-info {
            padding: 20px;
        }

        .product-name {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .product-description {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .product-price {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .price-tag {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .stock-info {
            font-size: 12px;
            color: #888;
        }

        .buy-button {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .buy-button:hover:not(:disabled) {
            transform: scale(1.05);
        }

        .buy-button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .product-card.owned {
            opacity: 0.7;
        }

        .product-card.owned .buy-button {
            background: #27ae60;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: bold;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        .notification.success {
            background: #27ae60;
            color: white;
        }

        .notification.error {
            background: #e74c3c;
            color: white;
        }

        .notification.info {
            background: #3498db;
            color: white;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .owned-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #27ae60;
            color: white;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
        }

        .product-card {
            position: relative;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 0;
            text-align: center;
            margin-bottom: 30px;
        }

        /* Temi Dinamici */
        body.theme-dark-premium {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1e 100%) !important;
        }

        body.theme-dark-premium .header {
            background: linear-gradient(135deg, #2d2d44 0%, #1a1a2e 100%) !important;
        }

        body.theme-dark-premium .product-card {
            background: #2d2d44 !important;
            color: white !important;
        }

        body.theme-dark-premium .product-name {
            color: white !important;
        }

        body.theme-dark-premium .product-description {
            color: #ccc !important;
        }

        body.theme-ocean {
            background: linear-gradient(135deg, #006994 0%, #004d6b 100%) !important;
        }

        body.theme-ocean .header {
            background: linear-gradient(135deg, #0088b3 0%, #006994 100%) !important;
        }

        body.theme-ocean .product-card {
            background: #0088b3 !important;
            color: white !important;
        }

        body.theme-ocean .product-name {
            color: white !important;
        }

        body.theme-ocean .product-description {
            color: #e6f7ff !important;
        }

        body.theme-forest {
            background: linear-gradient(135deg, #2d5016 0%, #1a3009 100%) !important;
        }

        body.theme-forest .header {
            background: linear-gradient(135deg, #4a7c2e 0%, #2d5016 100%) !important;
        }

        body.theme-forest .product-card {
            background: #4a7c2e !important;
            color: white !important;
        }

        body.theme-forest .product-name {
            color: white !important;
        }

        body.theme-forest .product-description {
            color: #e8f5e8 !important;
        }

        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .home-button {
            text-decoration: none;
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .home-button:hover {
            background: rgba(255,255,255,0.3);
        }

        .shop-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            color: white;
        }

        .stat-number {
            font-size: 32px;
            font-weight: bold;
            display: block;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="user-info">
            <a href="home.html" class="home-button">🏠 Torna alla Home</a>
            <h1 style="margin: 0;">🛍️ Negozio BrainPlay</h1>
            <div class="credits-display">
                <span>💰 Crediti: <span id="userCredits">0</span></span>
            </div>
        </div>
    </div>

    <div class="shop-container">
        <div class="shop-header">
            <p>Spendi i tuoi crediti per sbloccare contenuti esclusivi e personalizzare la tua esperienza!</p>
        </div>

        <div class="shop-stats">
            <div class="stat-card">
                <span class="stat-number" id="totalItems">0</span>
                <span class="stat-label">Oggetti Totali</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="ownedItems">0</span>
                <span class="stat-label">Oggetti Posseduti</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="totalSpent">0</span>
                <span class="stat-label">Crediti Spesi</span>
            </div>
        </div>

        <div class="shop-categories">
            <button class="category-btn active" data-category="all">Tutti</button>
            <button class="category-btn" data-category="avatar">Avatar</button>
            <button class="category-btn" data-category="themes">Temi</button>
            <button class="category-btn" data-category="powerups">Power-up</button>
            <button class="category-btn" data-category="premium">Premium</button>
        </div>

        <div class="products-grid" id="productsGrid">
            <!-- I prodotti verranno generati dinamicamente -->
        </div>
    </div>

    <script>
        // Sistema prodotti del negozio
        const products = [
            // Avatar Accessories
            {
                id: 'avatar_hat_1',
                name: 'Cappello da Studente',
                description: 'Un cappello elegante per il tuo avatar',
                price: 50,
                category: 'avatar',
                icon: '🎓',
                stock: 'illimitato'
            },
            {
                id: 'avatar_glasses_1',
                name: 'Occhiali da Sole',
                description: 'Occhiali stilosi per il tuo avatar',
                price: 30,
                category: 'avatar',
                icon: '🕶️',
                stock: 'illimitato'
            },
            {
                id: 'avatar_crown_1',
                name: 'Corona Reale',
                description: 'Mostra chi è il re dello studio!',
                price: 100,
                category: 'avatar',
                icon: '👑',
                stock: 'illimitato'
            },
            {
                id: 'avatar_wings_1',
                name: 'Ali Angeliche',
                description: 'Ali luminose per il tuo avatar',
                price: 150,
                category: 'avatar',
                icon: '👼',
                stock: 'illimitato'
            },
            
            // Temi
            {
                id: 'theme_dark_1',
                name: 'Tema Scuro Premium',
                description: 'Tema scuro con effetti speciali',
                price: 75,
                category: 'themes',
                icon: '🌙',
                stock: 'illimitato'
            },
            {
                id: 'theme_ocean_1',
                name: 'Tema Oceano',
                description: 'Tema blu con onde animate',
                price: 60,
                category: 'themes',
                icon: '🌊',
                stock: 'illimitato'
            },
            {
                id: 'theme_forest_1',
                name: 'Tema Foresta',
                description: 'Tema verde con elementi naturali',
                price: 60,
                category: 'themes',
                icon: '🌲',
                stock: 'illimitato'
            },
            
            // Power-up
            {
                id: 'powerup_double_credits',
                name: 'Crediti Doppi x5',
                description: 'Ricevi crediti doppi per le prossime 5 sessioni',
                price: 200,
                category: 'powerups',
                icon: '💎',
                stock: 'limitato',
                uses: 5
            },
            {
                id: 'powerup_hint_master',
                name: 'Maestro di Suggerimenti',
                description: 'Suggerimenti illimitati per 1 settimana',
                price: 150,
                category: 'powerups',
                icon: '💡',
                stock: 'limitato',
                duration: '7 giorni'
            },
            {
                id: 'powerup_time_bonus',
                name: 'Bonus Tempo Studio',
                description: '+30 minuti bonus per ogni sessione',
                price: 100,
                category: 'powerups',
                icon: '⏰',
                stock: 'limitato',
                duration: '30 giorni'
            },
            
            // Premium
            {
                id: 'premium_monthly',
                name: 'Abbonamento Mensile',
                description: 'Accesso completo a tutte le funzionalità premium',
                price: 500,
                category: 'premium',
                icon: '⭐',
                stock: 'illimitato',
                subscription: true
            },
            {
                id: 'premium_study_pack',
                name: 'Pack Studio Completo',
                description: 'Tutti gli schemi + riassunti premium',
                price: 300,
                category: 'premium',
                icon: '📚',
                stock: 'limitato'
            },
            {
                id: 'premium_exam_prep',
                name: 'Preparazione Esami',
                description: 'Contenuti speciali per preparazione esami',
                price: 250,
                category: 'premium',
                icon: '📝',
                stock: 'limitato'
            }
        ];

        // Variabili globali
        let userCredits = parseInt(localStorage.getItem('credits') || '0');
        let ownedProducts = JSON.parse(localStorage.getItem('ownedProducts') || '[]');
        let totalSpent = parseInt(localStorage.getItem('totalSpent') || '0');
        let currentCategory = 'all';

        // Inizializzazione
        document.addEventListener('DOMContentLoaded', function() {
            updateUserInfo();
            renderProducts();
            updateStats();
            setupCategoryFilters();
        });

        function updateUserInfo() {
            document.getElementById('userCredits').textContent = userCredits;
        }

        function updateStats() {
            const totalItems = products.length;
            const ownedCount = ownedProducts.length;
            
            document.getElementById('totalItems').textContent = totalItems;
            document.getElementById('ownedItems').textContent = ownedCount;
            document.getElementById('totalSpent').textContent = totalSpent;
        }

        function setupCategoryFilters() {
            const categoryButtons = document.querySelectorAll('.category-btn');
            
            categoryButtons.forEach(button => {
                button.addEventListener('click', function() {
                    // Rimuovi classe active da tutti i pulsanti
                    categoryButtons.forEach(btn => btn.classList.remove('active'));
                    
                    // Aggiungi classe active al pulsante cliccato
                    this.classList.add('active');
                    
                    // Filtra prodotti
                    currentCategory = this.dataset.category;
                    renderProducts();
                });
            });
        }

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            const filteredProducts = currentCategory === 'all' 
                ? products 
                : products.filter(p => p.category === currentCategory);
            
            grid.innerHTML = '';
            
            filteredProducts.forEach(product => {
                const isOwned = ownedProducts.includes(product.id);
                const canAfford = userCredits >= product.price;
                
                const productCard = document.createElement('div');
                productCard.className = `product-card ${isOwned ? 'owned' : ''}`;
                
                productCard.innerHTML = `
                    ${isOwned ? '<div class="owned-badge">POSSEDUTO</div>' : ''}
                    <div class="product-image">${product.icon}</div>
                    <div class="product-info">
                        <div class="product-name">${product.name}</div>
                        <div class="product-description">${product.description}</div>
                        <div class="product-price">
                            <span class="price-tag">${product.price} 💰</span>
                            <span class="stock-info">${product.stock}</span>
                        </div>
                        <button class="buy-button" 
                                onclick="purchaseProduct('${product.id}')"
                                ${isOwned ? 'disabled' : ''}
                                ${!canAfford && !isOwned ? 'disabled' : ''}>
                            ${isOwned ? 'Già Posseduto' : (canAfford ? 'Acquista' : 'Crediti Insufficienti')}
                        </button>
                    </div>
                `;
                
                grid.appendChild(productCard);
            });
        }

        function purchaseProduct(productId) {
            const product = products.find(p => p.id === productId);
            
            if (!product) {
                showNotification('Prodotto non trovato', 'error');
                return;
            }
            
            if (ownedProducts.includes(productId)) {
                showNotification('Hai già acquistato questo prodotto', 'info');
                return;
            }
            
            if (userCredits < product.price) {
                showNotification('Crediti insufficienti!', 'error');
                return;
            }
            
            // Processa acquisto
            userCredits -= product.price;
            totalSpent += product.price;
            ownedProducts.push(productId);
            
            // Salva nel localStorage
            localStorage.setItem('credits', userCredits.toString());
            localStorage.setItem('totalSpent', totalSpent.toString());
            localStorage.setItem('ownedProducts', JSON.stringify(ownedProducts));
            
            // Aggiorna UI
            updateUserInfo();
            updateStats();
            renderProducts();
            
            // Mostra notifica
            showNotification(`Acquisto completato: ${product.name}!`, 'success');
            
            // Applica effetti del prodotto
            applyProductEffects(product);
        }

        function applyProductEffects(product) {
            switch(product.category) {
                case 'avatar':
                    // Aggiungi accessorio all'avatar
                    addAvatarAccessory(product);
                    break;
                case 'themes':
                    // Applica tema immediatamente
                    applyTheme(product);
                    break;
                case 'powerups':
                    // Attiva power-up
                    activatePowerup(product);
                    break;
                case 'premium':
                    // Attiva funzionalità premium
                    console.log(`Funzionalità premium attivata: ${product.name}`);
                    break;
            }
        }

        function addAvatarAccessory(accessory) {
            const accessories = JSON.parse(localStorage.getItem('avatarAccessories') || '[]');
            if (!accessories.includes(accessory.id)) {
                accessories.push(accessory.id);
                localStorage.setItem('avatarAccessories', JSON.stringify(accessories));
                showNotification(`Accessorio aggiunto all'avatar: ${accessory.name}`, 'success');
            }
        }

        function applyTheme(theme) {
            // Rimuovi tutti i temi esistenti
            document.body.classList.remove('theme-dark-premium', 'theme-ocean', 'theme-forest');
            
            // Applica il nuovo tema
            switch(theme.id) {
                case 'theme_dark_1':
                    document.body.classList.add('theme-dark-premium');
                    localStorage.setItem('activeTheme', 'theme-dark-premium');
                    showNotification('Tema Scuro Premium applicato!', 'success');
                    break;
                case 'theme_ocean_1':
                    document.body.classList.add('theme-ocean');
                    localStorage.setItem('activeTheme', 'theme-ocean');
                    showNotification('Tema Oceano applicato!', 'success');
                    break;
                case 'theme_forest_1':
                    document.body.classList.add('theme-forest');
                    localStorage.setItem('activeTheme', 'theme-forest');
                    showNotification('Tema Foresta applicato!', 'success');
                    break;
            }
        }

        function activatePowerup(powerup) {
            const powerups = JSON.parse(localStorage.getItem('activePowerups') || '[]');
            
            const newPowerup = {
                id: powerup.id,
                name: powerup.name,
                activatedAt: Date.now(),
                duration: powerup.duration || null,
                uses: powerup.uses || null
            };
            
            powerups.push(newPowerup);
            localStorage.setItem('activePowerups', JSON.stringify(powerups));
            
            showNotification(`Power-up attivato: ${powerup.name}`, 'success');
        }

        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => {
                    document.body.removeChild(notification);
                }, 300);
            }, 3000);
        }

        // Aggiungi animazione slideOut
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideOut {
                to {
                    transform: translateX(100%);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
