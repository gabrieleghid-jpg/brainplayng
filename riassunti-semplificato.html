        * {

        }

            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }
        
        .content {
            padding: 40px;
        }
        
        .input-section {
            margin-bottom: 30px;
        }
        
        .input-section h3 {
            color: #4f46e5;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }
        
        textarea {
            width: 100%;
            min-height: 150px;
            padding: 20px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.3s ease;
        }
        
        textarea:focus {
            outline: none;
            border-color: #4f46e5;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        
        button {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .generate-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            flex: 1;
        }
        
        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
        }
        
        .generate-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }
        
        .clear-btn {
            background: #ef4444;
            color: white;
        }
        
        .clear-btn:hover {
            background: #dc2626;
        }
        
        .results {
            margin-top: 30px;
            display: none;
        }
        
        .result-section {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
        }
        
        .result-section h3 {
            color: #1e293b;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .result-section h3::before {
            content: '';
            width: 4px;
            height: 24px;
            background: #4f46e5;
            border-radius: 2px;
        }
        
        .result-content {
            line-height: 1.6;
            color: #374151;
        }
        
        .quiz-section {
            background: #fef3c7;
            border-color: #f59e0b;
        }
        
        .quiz-question {
            font-weight: 600;
            margin-bottom: 10px;
            color: #92400e;
        }
        
        .quiz-options {
            display: grid;
            gap: 8px;
            margin-bottom: 15px;
        }
        
        .quiz-option {
            padding: 10px 15px;
            background: white;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .quiz-option:hover {
            background: #f3f4f6;
            border-color: #4f46e5;
        }
        
        .quiz-option.correct {
            background: #d1fae5;
            border-color: #10b981;
        }
        
        .quiz-option.incorrect {
            background: #fee2e2;
            border-color: #ef4444;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }
        
        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #e5e7eb;
            border-top: 3px solid #4f46e5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

        // Funzione per generare contenuti dinamici MIGLIORATA
        function generateDynamicContent(topic) {
            const topicLower = topic.toLowerCase();
            
            // Controlla se è nel database

                if (topicLower.includes(key)) {

            // Rileva la categoria dell'argomento
            let category = detectCategory(topicLower);
            let content = generateContentByCategory(topic, category);
            
            return content;
        }

        // Funzione di ricerca su Wikipedia API
        async function searchWikipedia(topic) {
            try {
                const searchUrl = `https://it.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(topic)}`;
                
                const response = await fetch(searchUrl);
                if (!response.ok) {
                    throw new Error('Wikipedia page not found');
                }
                
                const data = await response.json();
                console.log('Risposta Wikipedia:', data);
                
                return {
                    abstract: data.extract || '',
                    title: data.title || topic,
                    url: data.content_urls?.desktop?.page || '',
                    thumbnail: data.thumbnail?.source || '',
                    hasInfo: data.extract && data.extract.length > 0,
                    source: 'Wikipedia'
                };
                
            } catch (error) {
                console.error('Errore Wikipedia:', error);
                return {
                    abstract: '',
                    title: topic,
                    url: '',
                    thumbnail: '',
                    hasInfo: false,
                    source: 'Wikipedia Errore'
                };
            }
        }

        // Funzione di ricerca reale su DuckDuckGo MIGLIORATA
        async function searchRealInfo(topic) {
            try {
                // Prima prova DuckDuckGo
                const searchUrl = `https://api.duckduckgo.com/?q=${encodeURIComponent(topic)}&format=json&pretty=1&no_html=1&skip_disambig=1`;
                
                const response = await fetch(searchUrl);
                if (!response.ok) {
                    throw new Error('Errore nella ricerca');
                }
                
                const data = await response.json();
                console.log('Risposta DuckDuckGo:', data);
                
                // Estrai informazioni complete e strutturate
                const abstract = data.Abstract || '';
                const relatedTopics = data.RelatedTopics || [];
                const infobox = data.Infobox || {};
                
                // Estrai dati aggiuntivi dall'infobox se presente
                const additionalInfo = Object.keys(infobox).length > 0 ? infobox : {};
                
                // Crea testo strutturato per i topic correlati
                const structuredTopics = relatedTopics
                    .slice(0, 8)
                    .map((topic, index) => {
                        const text = topic.Text || '';
                        const firstURL = topic.FirstURL || '';
                        return text ? `${index + 1}. ${text}` : '';
                    })
                    .filter(text => text.length > 0)
                    .join('\n');
                
                // Estrai definizioni e dati chiave
                const definitions = [];
                if (abstract) {
                    const sentences = abstract.split('. ');
                    sentences.forEach(sentence => {
                        if (sentence.includes('è') || sentence.includes('sono')) {
                            definitions.push(sentence.trim());
                        }
                    });
                }
                
                // Se DuckDuckGo ha informazioni buone, restituiscile
                if (abstract.length > 50 || structuredTopics.length > 3) {
                    return {
                        abstract: abstract,
                        definitions: definitions,
                        relatedTopics: structuredTopics,
                        additionalInfo: additionalInfo,
                        hasInfo: true,
                        source: 'DuckDuckGo',
                        relatedURLs: relatedTopics.slice(0, 5).map(topic => ({
                            text: topic.Text || '',
                            url: topic.FirstURL || ''
                        })).filter(item => item.text.length > 0)
                    };
                } else {
                    // Fallback a Wikipedia se DuckDuckGo non ha abbastanza informazioni
                    console.log('DuckDuckGo insufficiente, provo Wikipedia...');
                    const wikiData = await searchWikipedia(topic);
                    
                    // Estrai definizioni da Wikipedia
                    const wikiDefinitions = [];
                    if (wikiData.abstract) {
                        const sentences = wikiData.abstract.split('. ');
                        sentences.forEach(sentence => {
                            if (sentence.includes('è') || sentence.includes('sono') || sentence.includes('sono')) {
                                wikiDefinitions.push(sentence.trim());
                            }
                        });
                    }
                    
                    return {
                        abstract: wikiData.abstract,
                        definitions: wikiDefinitions,
                        relatedTopics: `Fonte: Wikipedia\n\nArticolo completo disponibile su: ${wikiData.url}`,
                        additionalInfo: wikiData,
                        hasInfo: wikiData.hasInfo,
                        source: 'Wikipedia',
                        relatedURLs: wikiData.url ? [{text: 'Articolo Wikipedia completo', url: wikiData.url}] : []
                    };
                }
                
            } catch (error) {
                console.error('Errore ricerca DuckDuckGo, provo Wikipedia:', error);
                
                // Fallback totale a Wikipedia
                try {
                    const wikiData = await searchWikipedia(topic);
                    const wikiDefinitions = [];
                    if (wikiData.abstract) {
                        const sentences = wikiData.abstract.split('. ');
                        sentences.forEach(sentence => {
                            if (sentence.includes('è') || sentence.includes('sono')) {
                                wikiDefinitions.push(sentence.trim());
                            }
                        });
                    }
                    
                    return {
                        abstract: wikiData.abstract,
                        definitions: wikiDefinitions,
                        relatedTopics: `Fonte: Wikipedia\n\nArticolo completo disponibile su: ${wikiData.url}`,
                        additionalInfo: wikiData,
                        hasInfo: wikiData.hasInfo,
                        source: 'Wikipedia (Fallback)',
                        relatedURLs: wikiData.url ? [{text: 'Articolo Wikipedia completo', url: wikiData.url}] : []
                    };
                } catch (wikiError) {
                    console.error('Errore anche Wikipedia:', wikiError);
                    return {
                        abstract: '',
                        definitions: [],
                        relatedTopics: '',
                        additionalInfo: {},
                        hasInfo: false,
                        source: 'Errore completo',
                        relatedURLs: []
                    };
                }
            }
        }

        async function generateMaterials() {

                alert('Per favore inserisci un argomento!');
                return;
            }
            
            // Mostra loading

                // Mostra risultati
                displayResults(content);
                
                // Nascondi loading e mostra risultati
                document.getElementById('loading').style.display = 'none';
                document.getElementById('results').style.display = 'block';
                
                console.log('Generazione completata con successo');
                
            } catch (error) {
                console.error('Errore generazione:', error);
                document.getElementById('loading').style.display = 'none';
                alert(`Errore durante la generazione: ${error.message}`);

        }

        // Funzione per visualizzare i risultati
        function displayResults(content) {
            // Spiegazione
            document.getElementById('spiegazione').innerHTML = content.spiegazione;
            
            // Riassunto (con supporto markdown base)
            let formattedRiassunto = content.riassunto
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/## (.*?)/g, '<h3>$1</h3>')
                .replace(/# (.*?)/g, '<h2>$1</h2>')
                .replace(/\n- (.*?)/g, '<li>$1</li>')
                .replace(/(<li>.*<\/li>)/g, '<ul>$1</ul>');
            
            document.getElementById('riassunto').innerHTML = formattedRiassunto;
            
            // Schema
            let formattedSchema = content.schema
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/## (.*?)/g, '<h3>$1</h3>')
                .replace(/### (.*?)/g, '<h4>$1</h4>')
                .replace(/\n- (.*?)/g, '<li>$1</li>')
                .replace(/(<li>.*<\/li>)/g, '<ul>$1</ul>');
            
            document.getElementById('schema').innerHTML = formattedSchema;
            
            // Quiz
            const quizHtml = `
                <div class="quiz-question">${content.quiz.domanda}</div>
                <div class="quiz-options">
                    ${content.quiz.opzioni.map((option, index) => 
                        `<div class="quiz-option" onclick="checkAnswer(${index}, ${content.quiz.risposta}, this)">${option}</div>`
                    ).join('')}
                </div>
            `;
            document.getElementById('quiz').innerHTML = quizHtml;
        }

        // Funzione per verificare le risposte del quiz
        function checkAnswer(selected, correct, element) {
            const options = document.querySelectorAll('.quiz-option');
            options.forEach(opt => {
                opt.style.pointerEvents = 'none';
                if (opt === element) {
                    opt.classList.add(selected === correct ? 'correct' : 'incorrect');
                } else if (options.indexOf(opt) === correct) {
                    opt.classList.add('correct');
                }
            });
        }

        // Funzione per cancellare i risultati
        function clearResults() {
            document.getElementById('textInput').value = '';
            document.getElementById('results').style.display = 'none';
            document.getElementById('loading').style.display = 'none';
        }
