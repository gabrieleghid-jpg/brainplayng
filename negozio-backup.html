<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Negozio Avatar - Image Layering</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="avatar-layering.css">
    <style>
        .shop-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            gap: 20px;
        }

        .shop-main {
            flex: 1;
        }

        .shop-sidebar {
            width: 250px;
        }

        .secret-code-section {
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
            border-radius: 15px;
            padding: 20px;
            color: white;
            text-align: center;
            margin-bottom: 20px;
        }

        .secret-code-section h3 {
            margin: 0 0 10px 0;
            font-size: 18px;
        }

        .secret-code-section p {
            margin: 0 0 15px 0;
            font-size: 14px;
            opacity: 0.9;
        }

        .secret-code-btn {
            background: white;
            color: #e67e22;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .secret-code-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .stats-sidebar {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            color: white;
        }

        .stats-sidebar h3 {
            margin: 0 0 15px 0;
            font-size: 16px;
            text-align: center;
        }

        .stats-sidebar .stat-item {
            text-align: center;
            margin-bottom: 15px;
        }

        .stats-sidebar .stat-number {
            display: block;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stats-sidebar .stat-label {
            font-size: 12px;
            opacity: 0.8;
        }

        .shop-header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        .shop-header h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .shop-header p {
            font-size: 18px;
            opacity: 0.9;
        }

        .credits-display {
            background: rgba(255,255,255,0.2);
            padding: 15px 25px;
            border-radius: 20px;
            font-size: 20px;
            font-weight: bold;
            display: inline-block;
            margin: 20px 0;
        }

        .shop-categories {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .category-btn {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 2px solid transparent;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .category-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .category-btn.active {
            background: white;
            color: #667eea;
            border-color: white;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .product-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .product-image {
            height: 200px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: white;
        }

        .product-info {
            padding: 20px;
        }

        .product-name {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .product-description {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .product-price {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .price-tag {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .stock-info {
            font-size: 12px;
            color: #888;
        }

        .buy-button {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .buy-button:hover:not(:disabled) {
            transform: scale(1.05);
        }

        .buy-button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .product-card.owned {
            opacity: 0.7;
        }

        .product-card.owned .buy-button {
            background: #27ae60;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: bold;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        .notification.success {
            background: #27ae60;
            color: white;
        }

        .notification.error {
            background: #e74c3c;
            color: white;
        }

        .notification.info {
            background: #3498db;
            color: white;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .owned-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #27ae60;
            color: white;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
        }

        .product-card {
            position: relative;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 0;
            text-align: center;
            margin-bottom: 30px;
        }

        /* Temi Dinamici */
        body.theme-dark-premium {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1e 100%) !important;
        }

        body.theme-dark-premium .header {
            background: linear-gradient(135deg, #2d2d44 0%, #1a1a2e 100%) !important;
        }

        body.theme-dark-premium .product-card {
            background: #2d2d44 !important;
            color: white !important;
        }

        body.theme-dark-premium .product-name {
            color: white !important;
        }

        body.theme-dark-premium .product-description {
            color: #ccc !important;
        }

        body.theme-ocean {
            background: linear-gradient(135deg, #006994 0%, #004d6b 100%) !important;
        }

        body.theme-ocean .header {
            background: linear-gradient(135deg, #0088b3 0%, #006994 100%) !important;
        }

        body.theme-ocean .product-card {
            background: #0088b3 !important;
            color: white !important;
        }

        body.theme-ocean .product-name {
            color: white !important;
        }

        body.theme-ocean .product-description {
            color: #e6f7ff !important;
        }

        body.theme-forest {
            background: linear-gradient(135deg, #2d5016 0%, #1a3009 100%) !important;
        }

        body.theme-forest .header {
            background: linear-gradient(135deg, #4a7c2e 0%, #2d5016 100%) !important;
        }

        body.theme-forest .product-card {
            background: #4a7c2e !important;
            color: white !important;
        }

        body.theme-forest .product-name {
            color: white !important;
        }

        body.theme-forest .product-description {
            color: #e8f5e8 !important;
        }

        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .home-button {
            text-decoration: none;
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .home-button:hover {
            background: rgba(255,255,255,0.3);
        }

        .shop-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            color: white;
        }

        .stat-number {
            font-size: 32px;
            font-weight: bold;
            display: block;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <!-- Header Navigazione -->
    <header class="nav">
        <button class="hamburger-btn" id="hamburgerBtn" type="button" aria-label="Apri menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <a href="home.html" class="brand">
            <span class="brand-icon">🧠</span>
            <span>brainplaying</span>
        </a>
        <div class="nav-actions">
            <a href="home.html" class="nav-link">Home</a>
            <a href="avatar-new.html" class="nav-link">Avatar</a>
            <a href="profile.html" class="profile-button">
                <span class="profile-avatar profile-avatar-small" id="navAvatar">BP</span>
            </a>
            <button class="theme-toggle" id="themeToggle" type="button" aria-label="Attiva modalità scura">🌙</button>
        </div>
    </header>

    <div class="page-shell">
        <main class="main-content">
            <div class="avatar-customizer">
                <h1 class="page-title">🛍️ Negozio Avatar</h1>
                
                <!-- Container Avatar con Image Layering -->
                <div class="avatar-showcase">
                    <div class="avatar-container" id="avatarContainer">
                        <!-- Layer 1: Corpo Base (z-index: 1) -->
                        <img class="avatar-layer body-layer" 
                             id="bodyLayer" 
                             src="assets/avatar/base_corpo.png" 
                             alt="Corpo Base"
                             style="z-index: 1;">
                        
                        <!-- Layer 2: Vestiti (z-index: 2) -->
                        <img class="avatar-layer clothes-layer" 
                             id="clothesLayer" 
                             src="assets/avatar/vestito_default.png" 
                             alt="Vestiti"
                             style="z-index: 2;">
                        
                        <!-- Layer 3: Capelli (z-index: 3) -->
                        <img class="avatar-layer hair-layer" 
                             id="hairLayer" 
                             src="assets/avatar/nessun_capello.png" 
                             alt="Capelli"
                             style="z-index: 3;">
                        
                        <!-- Layer 4: Accessori Testa (z-index: 4) -->
                        <img class="avatar-layer head-accessory-layer" 
                             id="headAccessoryLayer" 
                             src="assets/avatar/nessun_cappello.png" 
                             alt="Accessorio Testa"
                             style="z-index: 4;">
                        
                        <!-- Layer 5: Occhiali (z-index: 5) -->
                        <img class="avatar-layer glasses-layer" 
                             id="glassesLayer" 
                             src="assets/avatar/nessun_occhiale.png" 
                             alt="Occhiali"
                             style="z-index: 5;">
                    </div>
                    
                    <!-- Info Avatar -->
                    <div class="avatar-info">
                        <h3>Il Tuo Avatar</h3>
                        <div class="avatar-stats">
                            <div class="stat-item">
                                <span class="stat-label">Crediti:</span>
                                <span class="stat-value" id="avatarCredits">0</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">Oggetti:</span>
                                <span class="stat-value" id="ownedItems">0</span>
                            </div>
                        </div>
                        <button class="save-avatar-btn" onclick="saveAvatar()">💾 Salva Avatar</button>
                    </div>
                </div>

                <!-- Pannello Negozio -->
                <div class="shop-panel">
                    <h2>🛍️ Negozio Avatar</h2>
                    
                    <!-- Tabs Categoria -->
                    <div class="category-tabs">
                        <button class="tab-btn active" data-category="clothes" onclick="switchCategory('clothes')">👕 Vestiti</button>
                        <button class="tab-btn" data-category="hair" onclick="switchCategory('hair')">💇 Capelli</button>
                        <button class="tab-btn" data-category="head-accessories" onclick="switchCategory('head-accessories')">🎩 Cappelli</button>
                        <button class="tab-btn" data-category="glasses" onclick="switchCategory('glasses')">👓 Occhiali</button>
                    </div>

                    <!-- Griglia Prodotti -->
                    <div class="shop-grid" id="shopGrid">
                        <!-- Prodotti caricati dinamicamente -->
                    </div>

                    <!-- Filtro Posseduti -->
                    <div class="filter-controls">
                        <label class="filter-checkbox">
                            <input type="checkbox" id="showOwnedOnly" onchange="filterProducts()">
                            Mostra solo posseduti
                        </label>
                    </div>
                    
                    <!-- Codice Segreto -->
                    <div class="secret-code-section">
                        <h3>🔐 Codice Segreto</h3>
                        <p>Inserisci il codice segreto per ottenere crediti extra!</p>
                        <button class="secret-code-btn" onclick="window.location.href='codice.html'">Apri Codice</button>
                    </div>
                </div>

                <!-- Pannello Inventario -->
                <div class="inventory-panel">
                    <h2>🎒 Inventario</h2>
                    <div class="inventory-grid" id="inventoryGrid">
                        <!-- Oggetti posseduti caricati dinamicamente -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Sistema prodotti del negozio
        const products = [
            // Avatar Accessories
            {
                id: 'avatar_hat_1',
                name: 'Cappello da Studente',
                description: 'Un cappello elegante per il tuo avatar',
                price: 50,
                category: 'avatar',
                icon: '🎓',
                stock: 'illimitato'
            },
            {
                id: 'avatar_glasses_1',
                name: 'Occhiali da Sole',
                description: 'Occhiali stilosi per il tuo avatar',
                price: 30,
                category: 'avatar',
                icon: '🕶️',
                stock: 'illimitato'
            },
            {
                id: 'avatar_crown_1',
                name: 'Corona Reale',
                description: 'Mostra chi è il re dello studio!',
                price: 100,
                category: 'avatar',
                icon: '👑',
                stock: 'illimitato'
            },
            {
                id: 'avatar_wings_1',
                name: 'Ali Angeliche',
                description: 'Ali luminose per il tuo avatar',
                price: 150,
                category: 'avatar',
                icon: '👼',
                stock: 'illimitato'
            },
            
            // Temi
        ];

        let userCredits = 0;
        let ownedItems = [];
        let currentCategory = 'all';

        function applyTheme(theme) {
            // Rimuovi tutti i temi esistenti
            document.body.classList.remove('theme-dark-premium', 'theme-ocean', 'theme-forest');
            
            // Applica il nuovo tema
            switch(theme.id) {
                case 'theme_dark_1':
                    document.body.classList.add('theme-dark-premium');
                    localStorage.setItem('activeTheme', 'theme-dark-premium');
                    showNotification('Tema Scuro Premium applicato!', 'success');
                    break;
                case 'theme_ocean_1':
                    document.body.classList.add('theme-ocean');
                    localStorage.setItem('activeTheme', 'theme-ocean');
                    showNotification('Tema Oceano applicato!', 'success');
                    break;
                case 'theme_forest_1':
                    document.body.classList.add('theme-forest');
                    localStorage.setItem('activeTheme', 'theme-forest');
                    showNotification('Tema Foresta applicato!', 'success');
                    break;
            }
        }

        function activatePowerup(powerup) {
            const powerups = JSON.parse(localStorage.getItem('activePowerups') || '[]');
            
            const newPowerup = {
                id: powerup.id,
                name: powerup.name,
                activatedAt: Date.now(),
                duration: powerup.duration || null,
                uses: powerup.uses || null
            };
            
            powerups.push(newPowerup);
            localStorage.setItem('activePowerups', JSON.stringify(powerups));
            
            showNotification(`Power-up attivato: ${powerup.name}`, 'success');
        }

        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => {
                    document.body.removeChild(notification);
                }, 300);
            }, 3000);
        }

        // Aggiungi animazione slideOut
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideOut {
                to {
                    transform: translateX(100%);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
